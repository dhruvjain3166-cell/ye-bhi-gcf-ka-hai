<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login</title>
    <style>
        /* General Styles for Background and Font */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fff0f0, #ffecec);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation Bar Styles */
        .header-nav {
            background-color: #3e2723;
            padding: 15px 0;
            text-align: center;
        }
        .header-nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1em;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background-color 0.3s;
        }
        .header-nav a:hover {
            background-color: #5d4037;
        }

        /* Layout for Centering the Form */
        .form-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main Form Container (Card) */
        .simple-form-card {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            /* Red gradient border to match the theme */
            border-top: 5px solid #e74c3c; 
        }

        /* Heading Style with Color */
        h1 {
            color: #e74c3c;
            text-align: center;
            margin-bottom: 25px;
            font-size: 2em;
        }

        /* Form Grouping */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        /* Input Field Styling */
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* Button Styling with Gradient */
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .header-nav a {
                display: block;
                margin: 5px 10px;
            }
            .simple-form-card {
                padding: 20px;
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="restaurant.html">Menu</a>
        <a href="buy.html">Buy</a>
        <a href="login.html">Login</a>
        <a href="contact.html">Contact</a>
        <a href="complain.html">Complain</a>
    </div>

    <div class="form-wrapper">
        <div class="simple-form-card">
            <h1>Member Login</h1>
            <form action="#">
                <div class="form-group">
                    <label for="username">Username/Email:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Log In</button>
            </form>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Your Order</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f0f9ff, #ccf3ff);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header-nav {
            background-color: #3e2723;
            padding: 15px 0;
            text-align: center;
        }
        .header-nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1em;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background-color 0.3s;
        }
        .header-nav a:hover {
            background-color: #5d4037;
        }

        .form-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .simple-form-card {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
            border-top: 5px solid #4CAF50;
        }

        h1 {
            color: #4CAF50;
            text-align: center;
            margin-bottom: 25px;
            font-size: 2em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #4CAF50, #66BB6A);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            .header-nav a {
                display: block;
                margin: 5px 10px;
            }
            .simple-form-card {
                padding: 20px;
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="restaurant.html">Menu</a>
        <a href="buy.html">Buy</a>
        <a href="login.html">Login</a>
        <a href="contact.html">Contact</a>
        <a href="complain.html">Complain</a>
    </div>

    <div class="form-wrapper">
        <div class="simple-form-card">
            <h1>Place Your Order</h1>
            <form action="#">
                <div class="form-group">
                    <label for="item">Select Item (from Menu):</label>
                    <select id="item" name="item">
                        <option value="salmon">Grilled Salmon</option>
                        <option value="steak">Ribeye Steak</option>
                        <option value="fries">Truffle Fries</option>
                        <option value="cake">Lava Cake</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" name="quantity" value="1" min="1">
                </div>
                <div class="form-group">
                    <label for="address">Delivery Address:</label>
                    <input type="text" id="address" name="address" placeholder="123 Main St, City">
                </div>
                <button type="submit">Confirm Purchase</button>
            </form>
        </div>
    </div>

</body>
</html>
